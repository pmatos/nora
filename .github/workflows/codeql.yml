name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '40 2 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "22"
  CMAKE_PREFIX_PATH: /usr/lib/llvm-22
  CC: clang-22
  CXX: clang++-22

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['c-cpp']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$LLVM_VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgmp-dev "clang-${LLVM_VERSION}" \
            "llvm-${LLVM_VERSION}-dev" "llvm-${LLVM_VERSION}-tools"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build
        run: |
          cmake --preset release
          cmake --build --preset release --target norac

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
